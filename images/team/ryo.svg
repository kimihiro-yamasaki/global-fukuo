<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#2a2a2a"/>
  <!-- Neck -->
  <rect x="82" y="140" width="36" height="24" rx="4" fill="#f0c8a0"/>
  <!-- Shoulders / Shirt -->
  <ellipse cx="100" cy="195" rx="70" ry="45" fill="#333"/>
  <ellipse cx="100" cy="195" rx="68" ry="43" fill="#444"/>
  <!-- Collar -->
  <path d="M80 168 L100 180 L120 168" fill="none" stroke="#555" stroke-width="2"/>
  <!-- Face -->
  <ellipse cx="100" cy="105" rx="48" ry="55" fill="#f0c8a0"/>
  <!-- Ears - visible with short hair -->
  <ellipse cx="50" cy="108" rx="9" ry="13" fill="#e8b890"/>
  <ellipse cx="150" cy="108" rx="9" ry="13" fill="#e8b890"/>
  <ellipse cx="50" cy="108" rx="5" ry="8" fill="#daa880"/>
  <ellipse cx="150" cy="108" rx="5" ry="8" fill="#daa880"/>
  <!-- Hair - buzz cut, tightly fitted to head shape -->
  <path d="M50 92 Q50 48 100 44 Q150 48 150 92 Q150 70 138 58 Q120 44 100 44 Q80 44 62 58 Q50 70 50 92 Z" fill="#1a1a1a"/>
  <!-- Buzz texture - thin layer showing scalp -->
  <path d="M54 88 Q54 52 100 48 Q146 52 146 88 Q146 68 135 58 Q118 46 100 46 Q82 46 65 58 Q54 68 54 88 Z" fill="#252525" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M72 92 Q82 87 92 90" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M108 90 Q118 87 128 92" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="82" cy="102" rx="7" ry="7.5" fill="#fff"/>
  <ellipse cx="118" cy="102" rx="7" ry="7.5" fill="#fff"/>
  <ellipse cx="83" cy="103" rx="4.5" ry="5" fill="#2c1810"/>
  <ellipse cx="119" cy="103" rx="4.5" ry="5" fill="#2c1810"/>
  <ellipse cx="84" cy="101" rx="2" ry="2" fill="#fff"/>
  <ellipse cx="120" cy="101" rx="2" ry="2" fill="#fff"/>
  <!-- Nose -->
  <path d="M98 108 Q100 116 102 108" fill="none" stroke="#d4a882" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mouth - confident smile -->
  <path d="M88 124 Q100 130 112 124" fill="none" stroke="#c4877a" stroke-width="2" stroke-linecap="round"/>
</svg>
